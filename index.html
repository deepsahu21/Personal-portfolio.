<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Deep Sahu — ML Engineer & Researcher</title>
    <meta name="description"
        content="Deep Sahu — Applied ML Engineer and Data Engineer. Building ML systems that ship to real clients.">
    <meta property="og:title" content="Deep Sahu — ML Engineer & Researcher">
    <meta property="og:description" content="Applied ML Engineer · Data Engineer · Real-World Deployments">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aurora-green': '#00ffaa',
                        'aurora-blue': '#00aaff',
                        'aurora-purple': '#aa00ff',
                        'aurora-pink': '#ff00aa',
                        'dark-bg': '#0a0e1a',
                        'dark-card': '#1a1f2e',
                        'dark-border': '#2a2f3e'
                    },
                    animation: {
                        'aurora': 'aurora 15s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'glow': 'glow 2s ease-in-out infinite'
                    },
                    keyframes: {
                        aurora: {
                            '0%, 100%': {
                                backgroundPosition: '0% 50%',
                                backgroundSize: '200% 200%'
                            },
                            '50%': {
                                backgroundPosition: '100% 50%',
                                backgroundSize: '200% 200%'
                            }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        glow: {
                            '0%, 100%': {
                                boxShadow: '0 0 5px rgba(0, 255, 170, 0.5), 0 0 20px rgba(0, 255, 170, 0.3)'
                            },
                            '50%': {
                                boxShadow: '0 0 20px rgba(0, 170, 255, 0.8), 0 0 40px rgba(0, 170, 255, 0.4)'
                            }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Aurora gradient background */
        .aurora-bg {
            background: linear-gradient(-45deg, #0a0e1a, #1a0033, #002244, #001a33);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
        }

        /* Aurora light effect overlay */
        .aurora-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background:
                radial-gradient(ellipse at top left, rgba(0, 255, 170, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at top right, rgba(0, 170, 255, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at bottom left, rgba(170, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(ellipse at bottom right, rgba(255, 0, 170, 0.1) 0%, transparent 40%);
            pointer-events: none;
            opacity: 0.7;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0e1a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #00ffaa, #00aaff);
            border-radius: 5px;
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #00ffaa 0%, #00aaff 50%, #aa00ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Card hover effect */
        .card-hover {
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .card-hover:hover {
            border-color: #00ffaa;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 170, 0.2);
        }

        /* Progress bar animation */
        @keyframes progressAnimation {
            0% {
                width: 0%;
            }
        }

        .progress-bar {
            animation: progressAnimation 2s ease-out forwards;
        }

        /* Neon scrollbar just for the skills panel */
        .skills-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .skills-scroll::-webkit-scrollbar-track {
            background: #080b16;
            border-radius: 9999px;
        }

        .skills-scroll::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #00aaff, #aa00ff);
            border-radius: 9999px;
        }

        .skills-scroll::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #33bbff, #bb33ff);
        }
    </style>
</head>

<body class="bg-dark-bg text-gray-200 aurora-bg">
    <!-- Aurora overlay effect -->
    <div class="aurora-overlay"></div>

    <!-- ============================================================
         All sections are loaded from the /sections/ folder.
         To edit a section, open the corresponding file:
           sections/nav.html         – Navigation bar
           sections/home.html        – Hero / Home section
           sections/about.html       – About Me
           sections/experience.html  – Work Experience
           sections/skills.html      – Technical Skills
           sections/services.html    – Services
           sections/portfolio.html   – Portfolio / Projects
           sections/testimonials.html – Client Testimonials
           sections/blog.html        – Publications / Blog
           sections/contact.html     – Contact form
           sections/footer.html      – Footer
         ============================================================ -->

    <div id="section-nav"></div>
    <div id="section-home"></div>
    <div id="section-about"></div>
    <div id="section-experience"></div>
    <div id="section-skills"></div>
    <div id="section-services"></div>
    <div id="section-portfolio"></div>

    <div id="section-contact"></div>
    <div id="section-footer"></div>

    <script>
        /**
         * Loads all section HTML files into their placeholder divs.
         * After all sections are loaded, interactive scripts are initialised.
         */
        const sections = [
            { id: 'section-nav', file: 'sections/nav.html' },
            { id: 'section-home', file: 'sections/home.html' },
            { id: 'section-about', file: 'sections/about.html' },
            { id: 'section-experience', file: 'sections/experience.html' },
            { id: 'section-skills', file: 'sections/skills.html' },
            { id: 'section-services', file: 'sections/services.html' },
            { id: 'section-portfolio', file: 'sections/portfolio.html' },

            { id: 'section-contact', file: 'sections/contact.html' },
            { id: 'section-footer', file: 'sections/footer.html' },
        ];

        async function loadSections() {
            await Promise.all(
                sections.map(async ({ id, file }) => {
                    try {
                        const response = await fetch(file);
                        if (response.ok) {
                            document.getElementById(id).innerHTML = await response.text();
                        }
                    } catch (e) {
                        console.warn(`Could not load ${file}:`, e);
                    }
                })
            );

            // Once all HTML is in the DOM, initialise interactive behaviour
            initMobileMenu();
            initScrollAnimations();
            initSmoothScroll();
            initSkillsTabs();
            initContactForm();
        }

        /* ── Mobile menu ────────────────────────────────────── */
        function initMobileMenu() {
            window.toggleMobileMenu = function () {
                const menu = document.getElementById('mobileMenu');
                if (menu) menu.classList.toggle('hidden');
            };

            document.querySelectorAll('#mobileMenu a').forEach(link => {
                link.addEventListener('click', () => {
                    document.getElementById('mobileMenu').classList.add('hidden');
                });
            });
        }

        /* ── Scroll-triggered animations ────────────────────── */
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -100px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-slide-up');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('section').forEach(section => {
                observer.observe(section);
            });
        }

        /* ── Smooth scroll for anchor links ─────────────────── */
        function initSmoothScroll() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        }

        /* ── Skills tab switcher + progress bar animation ──── */
        function initSkillsTabs() {
            const tabs = document.querySelectorAll('.skill-tab');
            const contents = document.querySelectorAll('.skill-content');

            function getBarPercent(bar) {
                const labelRow = bar.parentElement.previousElementSibling;
                if (!labelRow) return 0;
                const percentSpan = labelRow.querySelector('span:last-child');
                if (!percentSpan) return 0;
                const match = percentSpan.textContent.match(/(\d+)/);
                return match ? parseInt(match[1], 10) : 0;
            }

            function activateTab(target) {
                contents.forEach(c => c.classList.add('hidden'));
                const panel = document.getElementById(target);
                if (!panel) return;
                panel.classList.remove('hidden');

                const bars = panel.querySelectorAll('.progress-fill');
                bars.forEach(bar => {
                    const width = getBarPercent(bar);
                    bar.style.transition = "none";
                    bar.style.width = "0%";
                    void bar.offsetWidth;
                    bar.style.transition = "width 0.7s ease-out";
                    bar.style.width = width + "%";
                });
            }

            tabs.forEach(tab => {
                tab.addEventListener("click", () => {
                    tabs.forEach(t => {
                        t.classList.remove("border-aurora-blue", "text-aurora-blue", "active-tab");
                        t.classList.add("border-dark-border", "text-gray-300");
                    });
                    tab.classList.add("border-aurora-blue", "text-aurora-blue", "active-tab");
                    tab.classList.remove("text-gray-300");
                    activateTab(tab.dataset.target);
                });
            });

            activateTab("tab-lang");
        }

        /* ── Contact form submission ────────────────────────── */
        function initContactForm() {
            const form = document.getElementById("contact-form");
            const successMsg = document.getElementById("form-success");
            if (!form) return;

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                const formData = new FormData(form);
                const response = await fetch(form.action, {
                    method: form.method,
                    body: formData,
                    headers: { Accept: "application/json" }
                });

                if (response.ok) {
                    form.reset();
                    successMsg.classList.remove("hidden");
                } else {
                    alert("Something went wrong. Please try again.");
                }
            });
        }

        // Kick everything off
        loadSections();
    </script>

</body>

</html>
